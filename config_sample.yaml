feeds:
  - name: "Nature"
    url: "https://www.nature.com/nature.rss"
  - name: "Science"
    url: "https://www.science.org/rss/news_current.xml"

research_interests: |
  I am interested in computational biology, specifically:
  - Single-cell RNA sequencing analysis methods
  - Protein structure prediction using machine learning
  - CRISPR gene editing mechanisms and off-target effects

# Optional: override the prompt sent to the LLM.
# Must contain {research_interests} and {articles_json} placeholders.
# Use {{ and }} to include literal braces in the prompt (e.g. in examples).
# If omitted, the built-in default prompt is used.
# prompt_template: |
#   You are a research article relevance filter. Your task is to review a list
#   of scientific article titles and abstracts, and identify which ones are
#   relevant to the researcher's stated interests.
#
#   RESEARCHER'S INTERESTS:
#   {research_interests}
#
#   ARTICLES TO EVALUATE:
#   The following is a JSON array of articles, each with an "index" (0-based),
#   "title", and "abstract".
#
#   {articles_json}
#
#   INSTRUCTIONS:
#   - Evaluate each article against the researcher's interests.
#   - Be conservative: only include an article if you are confident it is
#     relevant. When the abstract is absent, very short, or appears to be
#     metadata rather than a real abstract, apply a higher threshold — do not
#     include the article based on vague or superficial title-keyword overlap
#     alone.
#   - Return ONLY a JSON array containing objects for articles that ARE relevant.
#   - Each object must have exactly two fields:
#       "index": the integer index of the article from the input array
#       "rationale": a concise 1-3 sentence explanation of why this article is relevant
#   - If NO articles are relevant, return an empty JSON array: []
#   - Do NOT include any text before or after the JSON array.
#   - Do NOT wrap the JSON in markdown code fences.
#
#   Example of a valid response:
#   [{{"index": 0, "rationale": "..."}}]

database:
  path: "journal_filter.db"

# Which LLM provider to use for filtering articles.
# Options:
#   "anthropic" — Claude models via the Anthropic API (requires ANTHROPIC_API_KEY)
#   "gemini"    — Gemini models via the Google Generative AI API (requires GEMINI_API_KEY)
provider: "anthropic"

# Anthropic (Claude) provider settings.
# Only used when provider is set to "anthropic".
# Requires the ANTHROPIC_API_KEY environment variable.
anthropic:
  model: "claude-opus-4-6"
  batch_size: 50
  max_tokens: 5000
  # rpm_limit: 50  # max requests per minute (0 or omit = no limit)

# Google Gemini provider settings.
# Only used when provider is set to "gemini".
# Requires the GEMINI_API_KEY environment variable.
# gemini:
#   model: "gemini-2.5-flash"
#   batch_size: 50
#   max_tokens: 10000
#   rpm_limit: 10  # free tier is 10 RPM; paid tiers are higher

output:
  rss_path: "filtered_feed.xml"
  # text_path: "filtered_feed.txt"   # plain text list of matched articles
  feed_title: "My Filtered Research Feed"
  feed_link: "https://example.com/filtered_feed.xml"
  feed_description: "Articles matching my research interests"
  max_articles: 100
  max_age_days: 30

logging:
  level: "INFO"
  file: "journal_filter.log"
